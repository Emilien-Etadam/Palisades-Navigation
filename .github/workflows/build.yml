name: Build Palisades (Windows)

on:
  push:
    branches: [ main, master, "claude/**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: dotnet restore Palisades.Application/Palisades.Application.csproj

      - name: Build (Debug)
        run: msbuild Palisades.Application/Palisades.Application.csproj /p:Configuration=Debug /p:RestorePackages=false

      - name: Restore and run tests
        run: dotnet test Palisades.Tests/Palisades.Tests.csproj -c Debug -v minimal

      - name: Build (Release)
        run: msbuild Palisades.Application/Palisades.Application.csproj /p:Configuration=Release /p:RestorePackages=false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Palisades-win-x64
          path: Palisades.Application/bin/Release/
          retention-days: 14
