name: Build Palisades (Windows)

on:
  push:
    branches: [ main, master, "claude/**", "cursor/**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Restore dependencies
        run: dotnet restore Palisades.Application/Palisades.Application.csproj

      - name: Build (Debug)
        run: dotnet build Palisades.Application/Palisades.Application.csproj -c Debug --no-restore

      - name: Restore and run tests
        run: dotnet test Palisades.Tests/Palisades.Tests.csproj -c Debug -v minimal

      - name: Build (Release)
        run: dotnet build Palisades.Application/Palisades.Application.csproj -c Release --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Palisades-win-x64
          path: Palisades.Application/bin/Release/
          retention-days: 14
