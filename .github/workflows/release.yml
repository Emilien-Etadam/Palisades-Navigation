name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Palisades.sln

      - name: Test
        run: dotnet test Palisades.Tests/Palisades.Tests.csproj --no-restore --verbosity normal

      - name: Publish
        run: >
          dotnet publish Palisades.Application/Palisades.Application.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ github.ref_name }}
          -o ./publish

      - name: Strip v prefix for version
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          echo "clean=$v" >> $env:GITHUB_OUTPUT

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath Palisades-${{ github.ref_name }}-win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Palisades ${{ steps.version.outputs.clean }}
          generate_release_notes: true
          files: Palisades-${{ github.ref_name }}-win-x64.zip