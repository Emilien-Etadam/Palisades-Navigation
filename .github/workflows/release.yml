name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Strip v prefix
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          echo "clean=$v" >> $env:GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish Palisades.Application/Palisades.Application.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.clean }}
          -o ./publish

      - name: Zip portable
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath Palisades-${{ github.ref_name }}-win-x64.zip

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.clean }} installer\palisades.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Palisades ${{ steps.version.outputs.clean }}
          generate_release_notes: true
          files: |
            Palisades-${{ github.ref_name }}-win-x64.zip
            installer/Palisades-${{ steps.version.outputs.clean }}-setup.exe
